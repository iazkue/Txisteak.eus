<!DOCTYPE html>
<html lang="eu">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Txisteak.eus – Euskarazko Txisteak</title>
    <meta name="description"
        content="Euskarazko txisteak partekatu eta baloratu. Bidali zure txistea eta bozkatu gustuko dituzunak!">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&display=swap"
        rel="stylesheet" media="print" onload="this.media='all'">
    <noscript>
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&display=swap"
            rel="stylesheet">
    </noscript>
    <style>
        /* Critical CSS inlined to avoid render-blocking stylesheet */
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        body {
            font-family: 'Inter', ui-sans-serif, system-ui, sans-serif;
            background: #fdfcf8;
            color: #1c1917;
            -webkit-font-smoothing: antialiased
        }

        .root-skeleton {
            min-height: 100vh;
            display: flex;
            flex-direction: column
        }

        .skeleton-header {
            background: #fff;
            border-bottom: 1px solid #e7e5e4;
            height: 5rem;
            display: flex;
            align-items: center;
            padding: 0 1rem
        }

        .skeleton-header-inner {
            max-width: 72rem;
            margin: 0 auto;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center
        }

        .skeleton-logo {
            display: flex;
            align-items: center;
            gap: 0.75rem
        }

        .skeleton-logo-icon {
            width: 2.5rem;
            height: 2.5rem;
            background: #d52b1e;
            border-radius: 0.75rem
        }

        .skeleton-logo-text {
            font-size: 1.5rem;
            font-weight: 700;
            color: #1c1917
        }

        .skeleton-main {
            max-width: 72rem;
            margin: 0 auto;
            padding: 3rem 1rem;
            flex-grow: 1
        }

        .skeleton-card {
            background: rgba(255, 255, 255, 0.8);
            border: 1px solid #e7e5e4;
            border-radius: 1rem;
            padding: 2rem 3rem;
            text-align: center;
            position: relative;
            overflow: hidden
        }

        .skeleton-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: #d52b1e
        }

        .skeleton-label {
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #57534e;
            margin-bottom: 2rem
        }

        .skeleton-pulse {
            height: 1.5rem;
            background: #e7e5e4;
            border-radius: 0.5rem;
            margin: 0.75rem auto;
            animation: pulse 1.5s ease-in-out infinite
        }

        .skeleton-pulse:nth-child(2) {
            width: 80%
        }

        .skeleton-pulse:nth-child(3) {
            width: 60%
        }

        .skeleton-pulse:nth-child(4) {
            width: 70%
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1
            }

            50% {
                opacity: 0.4
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(12px)
            }

            to {
                opacity: 1;
                transform: translateY(0)
            }
        }

        .animate-fade-in-up {
            animation: fadeInUp 0.4s ease-out both
        }

        .animate-delay-100 {
            animation-delay: 0.1s
        }

        .animate-delay-200 {
            animation-delay: 0.2s
        }

        .animate-delay-400 {
            animation-delay: 0.4s
        }
    </style>
</head>

<body>
    <div id="root">
        <!-- Pre-render skeleton for faster LCP -->
        <div class="root-skeleton">
            <div class="skeleton-header">
                <div class="skeleton-header-inner">
                    <div class="skeleton-logo">
                        <div class="skeleton-logo-icon"></div>
                        <div class="skeleton-logo-text">Txisteak.eus</div>
                    </div>
                </div>
            </div>
            <div class="skeleton-main">
                <div class="skeleton-card">
                    <div class="skeleton-label">Eguneko Txistea</div>
                    <div class="skeleton-pulse"></div>
                    <div class="skeleton-pulse"></div>
                    <div class="skeleton-pulse"></div>
                </div>
            </div>
        </div>
    </div>
    <script type="module" src="/index.tsx"></script>
</body>

</html>
